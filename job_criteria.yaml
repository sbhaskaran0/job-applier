# Job search configuration.
#   search_defaults: used to build searches when you don't override per run.
#   baseline: the STRICT acceptance bar — a listing is only returned if it
#             passes every applicable criterion here. Edit these to taste.

search_defaults:
  titles:
    - "Product Manager"
    - "Senior Product Manager"
    - "Product Strategy"
    - "Business Operations"
    - "Corporate Strategy"
    - "Business Strategy"
    - "Strategy & Operations"
    - "Strategy and Operations"
    - "Chief of Staff"
    - "BizOps"
    - "Business Operations Analyst"
    - "Business Operations Associate"
    - "Strategy Analyst"
    - "Strategy Associate"
    - "Strategy Manager"
    - "Strategy Lead"
  locations:
    - "Los Angeles"
    - "Remote"
  remote_ok: true
  date_posted_days: 30

baseline:
  # Title / seniority
  # These double as the watchlist title prefilter (substring match). Keep them as
  # role phrases, not bare words like "product" (which matches sales/eng titles).
  acceptable_titles:
    - "Product Manager"
    - "Product Management"
    - "Product Lead"
    - "Product Operations"
    - "Product Strategy"
    - "Corporate Strategy"
    - "Business Strategy"
    - "Strategy & Operations"
    - "Strategy and Operations"
    - "Chief of Staff"
    - "BizOps"
    - "Business Operations"
    # Mid-level ops titles (JOB-26): "Manager/Lead" S&O skews 7+ yrs, so include
    # analyst/associate-level ops phrasings to widen mid-level supply.
    - "Strategy Analyst"
    - "Business Operations Analyst"
    - "Business Operations Associate"
  acceptable_seniority: ["Mid", "Senior", "Early Career", "Associate", "Manager"]
  # "Associate" intentionally NOT excluded (JOB-26): analyst/associate ops roles
  # are valid mid-level targets, so we don't reject them on the title-seniority gate.
  excluded_seniority: ["Director", "VP", "Head", "Principal", "Intern", "Junior"]

  # Location / remote
  locations_allowed: ["Los Angeles", "Remote"]
  relocation_targets: []
  remote_allowed: true

  # Salary floor (USD). A DISCLOSED salary below this is dropped; a listing that
  # does not disclose salary is kept but flagged "salary not listed".
  salary_floor: 130000  # JOB-26: lowered 150k->130k to match the S&O search intent

  # Advisory YoE window shown in the postings UI filters (JOB-55).
  yoe_min: 0
  yoe_max: 15
